name: Android Firebase CI/CD

on:
  pull_request:
    branches:
      - master
      - main
  push:
    branches:
      - master
      - main

permissions:
  contents: read
  packages: read

jobs:
  android:
    name: Build, Test, and Distribute
    runs-on: ubuntu-latest
    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ github.token }}
      GITHUB_PACKAGES_TOKEN: ${{ secrets.GITHUB_PACKAGES_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      - name: Prepare release credentials
        if: github.event_name == 'push'
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/firebase" "$RUNNER_TEMP/keystore"
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase/firebase-service-account.json"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/keystore/shopme-release.jks"

      - name: Build release and upload to Firebase App Distribution
        if: github.event_name == 'push'
        env:
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_SERVICE_ACCOUNT_FILE: ${{ runner.temp }}/firebase/firebase-service-account.json
          FIREBASE_APP_DISTRIBUTION_GROUPS: ${{ vars.FIREBASE_APP_DISTRIBUTION_GROUPS || 'internal-testers' }}
          FIREBASE_RELEASE_NOTES: "Shopme Android ${{ github.sha }}"
          SHOPME_KEYSTORE_PATH: ${{ runner.temp }}/keystore/shopme-release.jks
          SHOPME_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SHOPME_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SHOPME_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease :app:appDistributionUploadRelease
